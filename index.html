<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mathematics Quiz · Phillips Exeter Academy</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
<script type="module" src="https://unpkg.com/mathlive"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --accent: #9D2235;
  --accent-dark: #7A1A2A;
  --accent-light: #F5E8EB;
  --bg: #F5F3EE;
  --surface: #ECE7DC;
  --surface-deep: #E0D8C8;
  --divider: #CDC3B1;
  --text-primary: #2F2B25;
  --text-muted: #6F6A61;
}
body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text-primary);
  line-height: 1.5;
}
.screen { display: none; min-height: 100vh; }
.screen.active { display: flex; flex-direction: column; }

/* WELCOME */
.welcome-screen {
  display: flex;
  flex: 1;
  align-items: center; justify-content: center; padding: 2rem;
}
.welcome-box {
  background: white; border-radius: 16px; padding: 3rem 2.5rem;
  max-width: 480px; width: 100%; box-shadow: 0 2px 12px rgba(0,0,0,0.08);
}
.welcome-title {
  font-family: 'DM Serif Display', serif; font-size: 32px;
  margin-bottom: 0.5rem; color: var(--text-primary);
  text-align: center;
}
.welcome-subtitle {
  font-size: 15px; color: var(--text-muted); margin-bottom: 2rem;
  text-align: center;
}
.name-input {
  width: 100%; padding: 14px 16px; border-radius: 10px;
  border: 1.5px solid var(--divider); font-size: 15px;
  font-family: 'DM Sans', sans-serif; margin-bottom: 1rem;
  transition: border-color 0.15s;
}
.name-input:focus {
  outline: none; border-color: var(--accent);
}
.start-btn {
  padding: 14px 32px; border-radius: 10px;
  background: var(--accent); color: white; border: none;
  font-size: 15px; font-weight: 600; cursor: pointer;
  font-family: 'DM Sans', sans-serif; transition: background 0.15s;
  margin: 0 auto; display: block;
}
.start-btn:hover { background: var(--accent-dark); }

/* QUIZ SCREEN */
.quiz-screen { display: flex; flex-direction: column; height: 100vh; }

/* TOPBAR */
.topbar {
  background: white; border-bottom: 1px solid var(--divider);
  padding: 16px 24px; display: flex; align-items: center; justify-content: space-between;
}
.topbar-left {
  display: flex; align-items: center; gap: 16px;
}
.topbar-school {
  font-size: 13px; font-weight: 600; color: var(--text-muted);
  letter-spacing: 0.02em;
}
.topbar-title {
  font-size: 13px; color: var(--text-muted);
}
.topbar-name {
  font-size: 13px; font-weight: 600; color: var(--accent);
  display: none;
}

/* CONTENT */
.content-area {
  flex: 1; display: flex; overflow: hidden;
}

/* PROBLEM */
.problem-area {
  width: 45%; background: var(--surface); padding: 32px;
  overflow-y: auto; border-right: 1px solid var(--divider);
}
.problem-header {
  margin-bottom: 24px;
}
.problem-label {
  font-size: 11px; font-weight: 700; color: var(--accent);
  text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 8px;
}
.problem-text {
  font-size: 15px; line-height: 1.7; color: var(--text-primary);
}
.problem-text p {
  margin-bottom: 1rem;
}
.problem-text em {
  font-style: italic;
}

/* CHAT */
.chat-area {
  flex: 1; display: flex; flex-direction: column; background: white;
}
.chat-msgs {
  flex: 1; overflow-y: auto; padding: 24px;
}
.msg {
  margin-bottom: 20px;
}
.msg-name {
  font-size: 11px; font-weight: 600; margin-bottom: 4px;
  display: flex; align-items: center;
}
.msg-name-k { color: var(--accent); }
.msg-name-s { color: var(--text-muted); }
.msg-bubble {
  padding: 12px 16px; border-radius: 12px; font-size: 14px; line-height: 1.6;
  max-width: 85%; word-wrap: break-word;
}
.msg-bubble-k {
  background: var(--accent-light); color: var(--text-primary);
}
.msg-bubble-s {
  background: var(--surface); color: var(--text-primary);
}
.typing {
  display: none; padding: 0 24px 12px;
}
.typing-dots {
  display: flex; gap: 4px; padding: 12px 16px; background: var(--accent-light);
  border-radius: 12px; width: fit-content;
}
.typing-dot {
  width: 6px; height: 6px; border-radius: 50%; background: var(--accent);
  animation: bounce 1.4s infinite;
}
.typing-dot:nth-child(2) { animation-delay: 0.2s; }
.typing-dot:nth-child(3) { animation-delay: 0.4s; }
@keyframes bounce {
  0%, 60%, 100% { transform: translateY(0); }
  30% { transform: translateY(-6px); }
}

/* INPUT BAR */
.input-bar {
  border-top: 1px solid var(--divider); padding: 16px 24px;
  display: flex; gap: 12px; align-items: flex-end;
}
.input-wrap {
  flex: 1; background: var(--surface); border-radius: 12px;
  padding: 10px 12px; display: flex; gap: 8px; align-items: center;
}
.chat-input {
  flex: 1; border: none; background: none; font-size: 14px;
  font-family: 'DM Sans', sans-serif; color: var(--text-primary);
  resize: none; max-height: 120px;
}
.chat-input:focus { outline: none; }
.chat-input::placeholder { color: var(--text-muted); }
.eq-btn {
  width: 36px; height: 36px; border-radius: 8px; border: 1.5px solid var(--divider);
  background: white; color: var(--text-muted); font-size: 16px; cursor: pointer;
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  transition: all 0.12s; font-family: serif;
}
.eq-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-light); }
.mic-btn {
  width: 36px; height: 36px; border-radius: 8px; border: 1.5px solid var(--divider);
  background: white; color: var(--text-muted); cursor: pointer;
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  transition: all 0.12s;
}
.mic-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-light); }
.mic-btn.listening { background: var(--accent); color: white; border-color: var(--accent); }
.speaker-btn {
  width: 20px; height: 20px; border: none; background: none;
  color: var(--accent); cursor: pointer; opacity: 0.6;
  display: inline-flex; align-items: center; justify-content: center;
  transition: opacity 0.12s; margin-left: 8px; vertical-align: middle;
}
.speaker-btn:hover { opacity: 1; }
.send-btn {
  width: 44px; height: 44px; border-radius: 10px; border: none;
  background: var(--accent); color: white; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: background 0.15s; flex-shrink: 0;
}
.send-btn:hover { background: var(--accent-dark); }
.send-btn:disabled { background: var(--divider); cursor: not-allowed; }

/* NEXT/DOWNLOAD BAR */
.action-bar {
  border-top: 1px solid var(--divider); padding: 16px 24px;
  background: var(--surface); display: flex; align-items: center; justify-content: space-between;
}
.action-note {
  font-size: 12px; color: var(--text-muted);
}
.next-btn, .download-btn {
  padding: 10px 20px; border-radius: 8px; border: none;
  background: var(--accent); color: white; font-size: 13px;
  font-weight: 600; cursor: pointer; font-family: 'DM Sans', sans-serif;
  transition: background 0.15s;
}
.next-btn:hover, .download-btn:hover { background: var(--accent-dark); }

/* EQUATION MODAL */
.eq-overlay {
  position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.3); display: none; align-items: center;
  justify-content: center; z-index: 1000;
}
.eq-overlay.open { display: flex; }
.eq-modal {
  background: white; border-radius: 16px; width: 90%; max-width: 560px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.15);
}
.eq-header {
  padding: 20px 24px; border-bottom: 1px solid var(--divider);
  display: flex; align-items: center; justify-content: space-between;
}
.eq-header span { font-weight: 600; font-size: 16px; }
.eq-close {
  background: none; border: none; font-size: 24px; cursor: pointer;
  color: var(--text-muted); line-height: 1;
}
.eq-body { padding: 24px; }
.eq-hint {
  font-size: 12px; color: var(--text-muted); margin-bottom: 12px;
}
.eq-field {
  width: 100%; min-height: 60px; padding: 12px; border-radius: 8px;
  border: 1.5px solid var(--divider); font-size: 18px;
}
.eq-footer {
  padding: 16px 24px; border-top: 1px solid var(--divider);
  display: flex; justify-content: flex-end; gap: 12px;
}
.eq-cancel, .eq-insert {
  padding: 10px 20px; border-radius: 8px; font-size: 14px;
  font-weight: 600; cursor: pointer; font-family: 'DM Sans', sans-serif;
  border: none;
}
.eq-cancel {
  background: var(--surface); color: var(--text-primary);
}
.eq-insert {
  background: var(--accent); color: white;
}
.eq-insert:hover { background: var(--accent-dark); }
</style>
</head>
<body>

<!-- WELCOME SCREEN -->
<div class="screen active" id="screen-welcome">
  <div class="welcome-screen">
    <div class="welcome-box">
      <div class="welcome-title">Mathematics Quiz</div>
      <div class="welcome-subtitle">Phillips Exeter Academy · 3 Problems</div>
      <input type="text" class="name-input" id="name-input" placeholder="Your full name" onkeydown="if(event.key==='Enter')startQuiz()">
      <button class="start-btn" onclick="startQuiz()">Begin</button>
    </div>
  </div>
</div>

<!-- QUIZ SCREEN -->
<div class="screen" id="screen-quiz">
  <div class="quiz-screen">
    <!-- TOPBAR -->
    <div class="topbar">
      <div class="topbar-left">
        <div class="topbar-school">Phillips Exeter Academy</div>
        <div class="topbar-title">Mathematics Quiz</div>
      </div>
      <div class="topbar-name" id="topbar-name"></div>
    </div>

    <!-- CONTENT -->
    <div class="content-area">
      <!-- PROBLEM -->
      <div class="problem-area">
        <div class="problem-header">
          <div class="problem-label" id="problem-label">Problem 1 of 3</div>
        </div>
        <div class="problem-text" id="problem-text">
          <!-- Problem injected here -->
        </div>
      </div>

      <!-- CHAT -->
      <div class="chat-area">
        <div class="chat-msgs" id="chat-msgs">
          <!-- Messages injected here -->
        </div>
        <div class="typing" id="typing">
          <div style="font-size:11px;font-weight:600;color:var(--accent);margin-bottom:3px">Thinking Partner</div>
          <div class="typing-dots">
            <div class="typing-dot"></div>
            <div class="typing-dot"></div>
            <div class="typing-dot"></div>
          </div>
        </div>

        <!-- INPUT -->
        <div class="input-bar">
          <div class="input-wrap">
            <textarea class="chat-input" id="chat-input" rows="1" placeholder="Type your thinking..."
              onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
            <button class="mic-btn" id="mic-btn" onclick="toggleDictation()" title="Dictate">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path>
                <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
                <line x1="12" y1="19" x2="12" y2="23"></line>
                <line x1="8" y1="23" x2="16" y2="23"></line>
              </svg>
            </button>
            <button class="eq-btn" onclick="openEq()" title="Insert equation">∑</button>
          </div>
          <button class="send-btn" id="send-btn" onclick="sendMsg()" title="Send">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M12 19V5M5 12l7-7 7 7"/></svg>
          </button>
        </div>

        <!-- ACTION BAR -->
        <div class="action-bar" id="action-bar">
          <div class="action-note">When ready, move to the next problem.</div>
          <button class="next-btn" onclick="nextProblem()">Next problem</button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- EQUATION MODAL -->
<div class="eq-overlay" id="eq-overlay" onclick="if(event.target===this)closeEq()">
  <div class="eq-modal">
    <div class="eq-header">
      <span>Write an equation</span>
      <button class="eq-close" onclick="closeEq()">&times;</button>
    </div>
    <div class="eq-body">
      <div class="eq-hint">Type math — use / for fractions, ^ for exponents, sqrt for roots. Press Enter to insert.</div>
      <math-field class="eq-field" id="eq-field" virtual-keyboard-mode="manual" smart-fence></math-field>
    </div>
    <div class="eq-footer">
      <button class="eq-cancel" onclick="closeEq()">Cancel</button>
      <button class="eq-insert" onclick="insertEq()">Insert</button>
    </div>
  </div>
</div>

<script>
// ── CONFIG ──
const API_URL = '/api/chat';
const MODEL = 'claude-sonnet-4-20250514';

const SYSTEM_PROMPT = `You are a thinking partner for a student working on a timed mathematics quiz at Phillips Exeter Academy.

CONTEXT:
This is a multi-problem quiz. The student has already read each problem. Your role is to help them think through their reasoning, not to solve it for them.

RULE 0 — ALWAYS ASK FIRST:
Your first response for each problem must ask: "What did you try on your own, and where exactly did you get stuck?"

AFTER THAT — RESPONSIVE DIALOGUE:
This is a conversation, not an interrogation or a lecture.

HARKNESS PROBLEM-SOLVING MOVES:
When a student is stuck, suggest ONE of these concrete next steps (choose the one that fits their situation):
- Read the problem again and summarize what it's asking in your own words
- Draw a diagram or sketch the situation
- Define your variables clearly - what does each letter represent?
- Write out what you know and what you're looking for
- Check your units - are they consistent?
- Solve a simpler version first (smaller numbers, special case, one dimension instead of two)
- Review a similar problem you've seen before
- Look for a pattern (try a few examples)
- Guess and check with real numbers
- Work backwards from what you want to find
- Use an already established formula or relationship
- If possible, think about it with real objects or a concrete example

IMPORTANT: Suggest ONE move at a time based on where they are. Don't list options. Don't explain the strategy - just point them to it.

WHAT TO DO:
- Keep every response SHORT — 1-2 sentences maximum
- Give ONE concrete next step, not multiple options
- If they ask "how do I begin?", suggest the most concrete first move (usually: draw it, write what you know, or define variables)
- If they ask a question, answer it directly without elaboration
- If they share reasoning, respond to it briefly (confirm, extend, or ask one focused question)
- If they're stuck, offer one specific problem-solving move from the list above

WHAT NOT TO DO:
- Don't lecture or explain multiple approaches
- Don't list strategies as options - pick the one that fits and suggest it
- Don't ask a question after every response
- Don't solve the problem or give the answer
- Don't let wrong facts pass uncorrected
- Don't give up if they say "I don't know" — give them one concrete foothold

TIME PRESSURE:
Students have limited time. Be efficient. Every word counts.

TONE:
Brief, warm, direct. Like a peer who's working alongside them, not teaching them.`;

// ── PROBLEMS ──
const PROBLEMS = [
  {
    label: 'Problem 1 of 3 · Problem 131',
    text: '<p><em>A line goes through the points (2, 5) and (6, −1). Let P be the point on this line that is closest to the origin. Calculate the coordinates of P.</em></p>'
  },
  {
    label: 'Problem 2 of 3 · Problem 134',
    text: '<p><em>Given that P = (−1, −1), Q = (4, 3), A = (1, 2), and B = (7, k), find the value of k that makes the line AB <strong>(a)</strong> parallel to line PQ; <strong>(b)</strong> perpendicular to line PQ.</em></p>'
  },
  {
    label: 'Problem 3 of 3 · Problem 136',
    text: '<p><em>Ashley saved a distance equal to 80% of the length of the shortest side of a rectangular field by cutting across the diagonal of the field instead of along two of the sides. Find the ratio of the length of the shortest side to the length of the longest.</em></p>'
  }
];

// ── STATE ──
let studentName = '';
let currentProblem = 0;
let allMessages = []; // Store all messages across all problems
let currentMessages = []; // Messages for current problem only

// ── START ──
function startQuiz() {
  const input = document.getElementById('name-input');
  const name = input.value.trim();
  if (!name) { input.focus(); return; }
  studentName = name;

  document.getElementById('topbar-name').textContent = name;
  document.getElementById('topbar-name').style.display = 'inline';
  document.getElementById('screen-welcome').classList.remove('active');
  document.getElementById('screen-quiz').classList.add('active');

  loadProblem(0);
}

function loadProblem(index) {
  currentProblem = index;
  currentMessages = [];
  
  // Update problem display
  document.getElementById('problem-label').textContent = PROBLEMS[index].label;
  document.getElementById('problem-text').innerHTML = PROBLEMS[index].text;
  
  // Clear chat
  document.getElementById('chat-msgs').innerHTML = '';
  
  // Add greeting
  addMessage('assistant', 'Hey ' + studentName.split(' ')[0] + '. Take a look at the problem. What did you try on your own, and where exactly did you get stuck?');
  
  // Update action bar
  const actionBar = document.getElementById('action-bar');
  let leftBtn = '';
  let rightBtn = '';
  let note = '';
  
  if (index > 0) {
    leftBtn = '<button class="next-btn" onclick="previousProblem()">← Previous problem</button>';
  }
  
  if (index === 2) {
    note = 'When finished, download your full transcript.';
    rightBtn = '<button class="download-btn" onclick="downloadTranscript()">Download transcript</button>';
  } else {
    note = 'When ready, move to the next problem.';
    rightBtn = '<button class="next-btn" onclick="nextProblem()">Next problem →</button>';
  }
  
  actionBar.innerHTML = '<div style="display:flex;gap:12px">' + leftBtn + '</div><div class="action-note">' + note + '</div><div style="display:flex;gap:12px">' + rightBtn + '</div>';
  
  // Focus input
  document.getElementById('chat-input').focus();
}

function nextProblem() {
  if (currentProblem < 2) {
    loadProblem(currentProblem + 1);
  }
}

function previousProblem() {
  if (currentProblem > 0) {
    loadProblem(currentProblem - 1);
  }
}

// ── CHAT ──
function addMessage(role, text) {
  const container = document.getElementById('chat-msgs');
  const isK = role === 'assistant';
  const div = document.createElement('div');
  div.className = 'msg ' + (isK ? 'msg-k' : 'msg-s');
  
  const speakerBtn = isK ? '<button class="speaker-btn" onclick="speakText(\'' + text.replace(/'/g, "\\'") + '\')" title="Read aloud"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"></path></svg></button>' : '';
  
  div.innerHTML =
    '<div class="msg-name ' + (isK ? 'msg-name-k' : 'msg-name-s') + '">' + 
    (isK ? 'Thinking Partner' : studentName.split(' ')[0]) + speakerBtn +
    '</div>' +
    '<div class="msg-bubble ' + (isK ? 'msg-bubble-k' : 'msg-bubble-s') + '">' + escapeHtml(text) + '</div>';
  container.appendChild(div);
  
  // Render math
  renderMathInElement(div, {
    delimiters: [
      { left: '$$', right: '$$', display: true },
      { left: '$', right: '$', display: false },
      { left: '\\(', right: '\\)', display: false },
      { left: '\\[', right: '\\]', display: true }
    ],
    throwOnError: false
  });
  container.scrollTop = container.scrollHeight;
  
  // Store message
  currentMessages.push({ role, content: text });
  allMessages.push({ problem: currentProblem + 1, role, content: text });
}

async function sendMsg() {
  const input = document.getElementById('chat-input');
  const text = input.value.trim();
  if (!text) return;

  // Add user message
  addMessage('user', text);
  input.value = '';
  autoResize(input);

  // Show typing
  document.getElementById('typing').style.display = 'block';
  document.getElementById('send-btn').disabled = true;

  try {
    const response = await fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: MODEL,
        max_tokens: 1000,
        system: SYSTEM_PROMPT + '\n\nCURRENT PROBLEM:\n' + PROBLEMS[currentProblem].text.replace(/<[^>]*>/g, ''),
        messages: currentMessages
      })
    });

    if (!response.ok) throw new Error('API error');
    const data = await response.json();
    const reply = data.content[0].text;

    // Hide typing and add response
    document.getElementById('typing').style.display = 'none';
    addMessage('assistant', reply);

  } catch (err) {
    document.getElementById('typing').style.display = 'none';
    addMessage('assistant', 'Sorry, something went wrong. Please try again.');
    console.error(err);
  } finally {
    document.getElementById('send-btn').disabled = false;
    input.focus();
  }
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMsg();
  }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

// ── EQUATION EDITOR ──
function openEq() {
  document.getElementById('eq-overlay').classList.add('open');
  const field = document.getElementById('eq-field');
  setTimeout(() => field.focus(), 100);
}

function closeEq() {
  document.getElementById('eq-overlay').classList.remove('open');
  document.getElementById('eq-field').value = '';
}

function insertEq() {
  const field = document.getElementById('eq-field');
  const latex = field.getValue();
  if (latex) {
    const input = document.getElementById('chat-input');
    input.value += ' $$' + latex + '$$ ';
    autoResize(input);
  }
  closeEq();
  document.getElementById('chat-input').focus();
}

// ── TRANSCRIPT ──
function downloadTranscript() {
  const lines = [];
  lines.push('Phillips Exeter Academy — Mathematics Quiz');
  lines.push('Student: ' + studentName);
  lines.push('Date: ' + new Date().toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' }));
  lines.push('Time: ' + new Date().toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', hour12: true }));
  lines.push('');
  lines.push('═'.repeat(60));
  
  let currentProb = 0;
  allMessages.forEach(m => {
    if (m.problem !== currentProb) {
      currentProb = m.problem;
      lines.push('');
      lines.push('═'.repeat(60));
      lines.push('PROBLEM ' + currentProb + ': ' + PROBLEMS[currentProb - 1].label);
      lines.push('═'.repeat(60));
      lines.push('');
    }
    const role = m.role === 'assistant' ? '[THINKING PARTNER]' : '[' + studentName.toUpperCase() + ']';
    lines.push(role);
    lines.push(m.content);
    lines.push('');
  });
  
  lines.push('═'.repeat(60));
  lines.push('End of transcript');

  const blob = new Blob([lines.join('\n')], { type: 'text/plain' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'math-quiz-' + studentName.replace(/\s+/g, '-').toLowerCase() + '.txt';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

// ── VOICE FEATURES ──
let recognition = null;
let isListening = false;

function toggleDictation() {
  if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
    alert('Speech recognition not supported in this browser. Try Chrome or Edge.');
    return;
  }
  
  if (isListening) {
    if (recognition) recognition.stop();
    return;
  }
  
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  recognition = new SpeechRecognition();
  recognition.continuous = false;
  recognition.interimResults = false;
  recognition.lang = 'en-US';
  
  recognition.onstart = () => {
    isListening = true;
    document.getElementById('mic-btn').classList.add('listening');
  };
  
  recognition.onresult = (event) => {
    const transcript = event.results[0][0].transcript;
    const input = document.getElementById('chat-input');
    input.value = (input.value ? input.value + ' ' : '') + transcript;
    autoResize(input);
  };
  
  recognition.onerror = (event) => {
    console.error('Speech recognition error:', event.error);
    isListening = false;
    document.getElementById('mic-btn').classList.remove('listening');
  };
  
  recognition.onend = () => {
    isListening = false;
    document.getElementById('mic-btn').classList.remove('listening');
  };
  
  recognition.start();
}

function speakText(text) {
  if ('speechSynthesis' in window) {
    window.speechSynthesis.cancel();
    const utterance = new SpeechSynthesisUtterance(text);
    utterance.rate = 0.95;
    utterance.pitch = 1.0;
    window.speechSynthesis.speak(utterance);
  }
}
